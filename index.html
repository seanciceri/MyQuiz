<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <script src="https://unpkg.com/vue@3"></script>
</head>

<body>

  background-color: #f0f0f0;
    <!-- qui creiamo un div con id "app" che sarà il nostro punto di montaggio per l'app Vue -->
<div id="app">
  <h1 v-html="question"></h1> <!-- v-html ci permette di interpretare il testo come HTML, utile per le domande che contengono caratteri speciali -->
  
  <p>Domanda {{ currentQuestion }} di {{ maxQuestions }}</p>
  <p>Difficulty: {{ getDifficulty() }}</p>

   <!-- qui usiamo v-for per creare un pulsante per ogni opzione, e @click per chiamare la funzione checkAnswer quando viene cliccato -->
  <button               
    v-for="option in options" 
    @click="checkAnswer(option)"
    :disabled="answered"  
  >
    {{ option }}
  </button>
  <br>
  <button @click="nextQuestion" :disabled="!answered"> <!-- disabilitiamo il pulsante "Next Question" finché l'utente non ha risposto alla domanda corrente -->
  Next Question
  </button>

  <p v-if="result"
  >{{ result }}</p>

  <p>Punteggio: {{ score }}</p> 
  <!-- mostriamo il punteggio attuale dell'utente -->


</div>

<script>
const { createApp } = Vue;

// qui creiamo l'app Vue e definiamo i dati e i metodi necessari per il funzionamento del quiz
createApp({
  data() {
    return {
      question: "",
      options: [],
      correctAnswer: "",
      result: "",
      answered: false,
      score : 0,
      currentQuestion: 1,
      maxQuestions: 15
    }
  },

// qui definiamo i metodi per recuperare la domanda dal API e per verificare la risposta dell'utente
  methods: {
    async fetchQuestion() {  // usiamo fetch per recuperare una domanda dal API di Open Trivia DB
      const difficulty = this.getDifficulty(); // determiniamo la difficoltà in base al numero di domande già fatte
      const response = await fetch(
    `https://opentdb.com/api.php?amount=1&type=multiple&difficulty=${difficulty}`
      ); // facciamo una richiesta GET al API per ottenere una domanda di tipo "multiple choice" con la difficoltà specificata
      const data = await response.json(); // convertiamo la risposta in JSON

      const q = data.results[0]; // prendiamo la prima domanda (data.results è un array, ma noi ne vogliamo solo una)

      this.question = q.question;   // salviamo la domanda
      this.correctAnswer = q.correct_answer;  // salviamo la risposta corretta

      // uniamo risposte corrette + sbagliate
      this.options = [...q.incorrect_answers, q.correct_answer]; // creiamo un array con tutte le opzioni (corretta + sbagliate)

      // mischiamo le risposte
      this.options.sort(() => Math.random() - 0.5);  // mescoliamo le opzioni in modo casuale per evitare che la risposta corretta sia sempre alla fine
      
    },


    // qui definiamo la funzione getDifficulty che restituisce la difficoltà in base al numero di domande già fatte
    getDifficulty() {
      if (this.currentQuestion <= 5) return "easy";
      if (this.currentQuestion <= 10) return "medium";
      return "hard";
    },



    // qui definiamo la funzione nextQuestion che viene chiamata quando l'utente clicca sul pulsante "Next Question"
    nextQuestion() {
      this.result = ""; // pulisce il risultato precedente
      this.answered = false; // resetta lo stato di risposta
      this.fetchQuestion(); // carica una nuova domanda
      this.currentQuestion++; // incrementa il contatore delle domande
      if(this.currentQuestion > this.maxQuestions) {
        alert(`Hai completato il quiz! Il tuo punteggio finale è: ${this.score}`);
        this.resetGame();
      }
      this.fetchQuestion(); // carica una nuova domanda
    },


    // qui definiamo la funzione resetGame che viene chiamata quando l'utente completa il quiz o quando risponde in modo errato
    resetGame() {
      this.score = 0; // resetta il punteggio
      this.currentQuestion = 1; // resetta il contatore delle domande
      this.result = ""; // pulisce il risultato precedente
      this.answered = false; // resetta lo stato di risposta
      this.fetchQuestion(); // carica una nuova domanda
    },

    // qui definiamo la funzione checkAnswer che viene chiamata quando l'utente clicca su una delle opzioni di risposta
    checkAnswer(option) {
  if (this.answered) return; // blocca click multipli

  this.answered = true;

  if (option === this.correctAnswer) {
    this.result = "✅ Corretto!";
    this.score++; // incrementa il punteggio se la risposta è corretta
  } else {
    this.result = `❌ Sbagliato! La risposta corretta era: ${this.correctAnswer}`;
    setTimeout(() => {  // usiamo setTimeout per mostrare la risposta corretta per un breve periodo prima di passare alla domanda successiva
      this.resetGame(); // resetta il gioco dopo 60 secondi
    }, 1000); // mostra la risposta corretta dopo 1 secondo
  }
  },
  },
  



// qui usiamo il ciclo di vita "mounted" per chiamare la funzione fetchQuestion quando l'app viene montata, in modo da caricare subito una domanda quando l'utente apre la pagina
  mounted() {
    this.fetchQuestion();
  }
}).mount('#app');
</script>


</body>
</html>
